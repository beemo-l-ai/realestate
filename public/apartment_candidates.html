<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>아파트 후보 선택</title>
  <link rel="stylesheet" href="global-ui.css">
  <style>
    :root {
      --bg: transparent;
      --surface: rgba(255, 255, 255, 0.85);
      --line: rgba(212, 222, 234, 0.7);
      --line-strong: rgba(180, 195, 215, 0.9);
      --text: #0f172a;
      --muted: #4b5563;
      --accent: #0ea5e9;
      --accent-soft: rgba(224, 242, 254, 0.8);
      --radius-lg: 18px;
      --radius-md: 12px;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      /* 투명 배경 유지 */
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Pretendard", "Noto Sans KR", sans-serif;
      overflow: hidden;
    }

    /* widget-root (global-ui.css) 의 height:auto 에 맞춰 내부 레이아웃 구성 */

    #root {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      max-height: 400px;
      /* 최대 높이 제한 */
    }

    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(248, 251, 255, 0.6);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      flex-shrink: 0;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .count {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 2px 6px;
    }

    .hint {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .body {
      padding: 12px;
      flex: 1;
      overflow-y: auto;
      display: grid;
      gap: 8px;
    }

    /* Skeleton Loading */
    .skeleton {
      display: grid;
      gap: 8px;
    }

    .sk-item {
      height: 68px;
      border-radius: var(--radius-md);
      background: linear-gradient(100deg, rgba(237, 242, 249, 0.6) 20%, rgba(248, 251, 255, 0.8) 50%, rgba(237, 242, 249, 0.6) 80%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .item {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .item:hover {
      background: #ffffff;
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(14, 165, 233, 0.1);
    }

    .item:active {
      background: var(--accent-soft);
      transform: translateY(0);
    }

    .item:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    .name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .sub {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .chip {
      font-size: 11px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 1px 5px;
    }

    .alias {
      font-size: 11px;
      color: #0284c7;
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 4px;
      padding: 2px 6px;
    }

    .status {
      padding: 10px;
      border-radius: var(--radius-md);
      font-size: 12px;
      text-align: center;
      background: rgba(248, 251, 255, 0.5);
      border: 1px solid var(--line);
    }

    .status.empty {
      color: #ef4444;
      background: rgba(254, 226, 226, 0.5);
      border-color: rgba(254, 202, 202, 0.5);
    }

    .hidden {
      display: none !important;
    }

    /* Scrollbar */
    .body::-webkit-scrollbar {
      width: 4px;
    }

    .body::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div id="root" class="widget-root">
    <div class="header">
      <div class="title-row">
        <h1>단지 선택</h1>
        <span id="count" class="count">찾는 중...</span>
      </div>
      <p class="hint">단지를 선택하면 해당 정보로 조회를 바로 재개합니다.</p>
    </div>

    <div class="body">
      <div id="loading" class="skeleton">
        <div class="sk-item"></div>
        <div class="sk-item"></div>
        <div class="sk-item"></div>
      </div>
      <div id="list" class="list hidden"></div>
      <div id="status" class="status hidden"></div>
    </div>
  </div>

  <script>
    const loadingEl = document.getElementById('loading');
    const listEl = document.getElementById('list');
    const statusEl = document.getElementById('status');
    const countEl = document.getElementById('count');

    function escapeHtml(v) {
      return String(v || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;");
    }

    function setStatus(msg, type) {
      if (!msg) { statusEl.classList.add('hidden'); return; }
      statusEl.className = `status ${type === 'empty' ? 'empty' : ''}`;
      statusEl.textContent = msg;
      statusEl.classList.remove('hidden');
    }

    async function selectCandidate(item) {
      const selectedText = `${item.legalDong || ''} ${item.apartmentName || ''}`.trim();
      setStatus(`${selectedText} 선택됨...`, 'info');

      const buttons = listEl.querySelectorAll('button.item');
      buttons.forEach(btn => btn.disabled = true);

      try {
        if (window?.openai?.callTool) {
          await window.openai.callTool('select_apartment_candidate', {
            selectedText,
            apartmentName: item.apartmentName || selectedText,
            legalDong: item.legalDong || '',
            districtCode: item.districtCode || ''
          });
        }

        const followupText = `${selectedText} 단지로 선택했어. 방금 전 요청을 이 단지 기준으로 바로 계속 진행해줘.`.trim();
        let autoTriggered = false;

        if (typeof window?.openai?.sendFollowUpMessage === 'function') {
          await window.openai.sendFollowUpMessage(followupText);
          autoTriggered = true;
        } else if (typeof window?.openai?.setInputText === 'function' && typeof window?.openai?.submitInput === 'function') {
          await window.openai.setInputText(followupText);
          await window.openai.submitInput();
          autoTriggered = true;
        }

        if (autoTriggered) {
          setStatus('선택 완료! 조회를 다시 시작합니다.');
        } else {
          setStatus('선택되었습니다. 채팅창에 "계속 진행해줘"라고 입력해 주세요.');
        }
      } catch (err) {
        setStatus('전달 오류: ' + err.message, 'empty');
        buttons.forEach(btn => btn.disabled = false);
      }
    }

    function renderCandidates(candidates, fallbackMode) {
      loadingEl.classList.add('hidden');
      listEl.classList.remove('hidden');

      if (!candidates?.length) {
        countEl.textContent = '0개';
        listEl.innerHTML = '';
        setStatus('일치하는 단지가 없습니다. 지역명을 포함해 보세요.', 'empty');
        return;
      }

      countEl.textContent = `${candidates.length}개 후보`;
      listEl.innerHTML = candidates.map((item, idx) => {
        const name = `${item.legalDong || ''} ${item.apartmentName || ''}`.trim();
        const trades = Number(item.totalTrades || 0).toLocaleString();
        const aliases = Array.isArray(item.aliases) ? item.aliases.slice(0, 2) : [];

        return `
          <button class="item" type="button" data-index="${idx}">
            <div class="name-row">
              <span class="dot"></span>
              <span class="name">${escapeHtml(name)}</span>
            </div>
            <div class="sub">
              <span class="chip">${escapeHtml(item.districtCode || '')}</span>
              <span class="chip">실거래 ${escapeHtml(trades)}건</span>
              ${aliases.map(a => `<span class="alias">#${escapeHtml(a)}</span>`).join('')}
            </div>
          </button>
        `;
      }).join('');

      const modes = { regional: '지역 내 주요 단지입니다.', global: '유사한 이름의 단지들입니다.' };
      setStatus(modes[fallbackMode] || '목록에서 단지를 선택하세요.');

      listEl.querySelectorAll('button.item').forEach((button) => {
        button.addEventListener('click', () => {
          const item = candidates[Number(button.getAttribute('data-index'))];
          if (item) selectCandidate(item);
        });
      });
    }

    function renderFromPayload(toolOutput) {
      const data = toolOutput?.structuredContent || toolOutput;
      if (data?.candidates) renderCandidates(data.candidates, data.fallbackMode);
    }

    try { if (window?.openai?.toolOutput) renderFromPayload(window.openai.toolOutput); } catch (e) { }
    window.addEventListener('message', (e) => {
      if (e.source === window.parent && e.data?.method === 'ui/notifications/tool-result') renderFromPayload(e.data.params);
    });
    window.addEventListener('openai:set_globals', (e) => renderFromPayload(e.detail?.globals?.toolOutput));
  </script>
</body>

</html>
