<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Oracle DB Browser</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f2f4f7;
      --panel: #ffffff;
      --line: #d5d9e0;
      --text: #1f2937;
      --muted: #677489;
      --accent: #0f766e;
      --accent-soft: #d7f3ef;
      --danger: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Noto Sans KR", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 10% -20%, #e6fff7 0, transparent 30%), radial-gradient(circle at 110% 0%, #dce7ff 0, transparent 34%), var(--bg);
      min-height: 100vh;
    }
    .layout { display: grid; grid-template-columns: 300px 1fr; gap: 14px; height: 100vh; padding: 14px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; overflow: hidden; box-shadow: 0 6px 22px rgba(10, 15, 30, 0.06); }
    .head { padding: 12px 14px; border-bottom: 1px solid var(--line); background: linear-gradient(90deg, #f9fafb, #ffffff); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .title { font-weight: 700; font-size: 15px; }
    .small { color: var(--muted); font-size: 12px; }
    .tools { display: flex; gap: 8px; padding: 10px; }
    input, button, textarea { font: inherit; border-radius: 10px; border: 1px solid var(--line); padding: 8px 10px; background: #fff; color: var(--text); }
    input, textarea { width: 100%; }
    button { cursor: pointer; background: var(--accent); border-color: var(--accent); color: #fff; transition: transform .08s ease; }
    button:active { transform: translateY(1px); }
    .list { height: calc(100vh - 120px); overflow: auto; padding: 8px; }
    .table-item { width: 100%; text-align: left; margin-bottom: 6px; border: 1px solid transparent; background: #fff; color: var(--text); padding: 8px 10px; border-radius: 9px; cursor: pointer; }
    .table-item:hover { border-color: var(--line); background: #f9fafb; }
    .table-item.active { background: var(--accent-soft); border-color: #9bd8cf; }
    .content { display: grid; grid-template-rows: auto auto auto 1fr; height: 100%; }
    .query-wrap { padding: 10px; border-bottom: 1px solid var(--line); }
    .query-actions { display: flex; gap: 8px; margin-top: 8px; }
    .status { padding: 8px 12px; border-bottom: 1px solid var(--line); color: var(--muted); font-size: 12px; min-height: 36px; }
    .status.err { color: var(--danger); }
    .grid-wrap { overflow: auto; height: 100%; }
    table { border-collapse: collapse; min-width: 100%; }
    th, td { border: 1px solid #e5e7eb; padding: 6px 8px; text-align: left; vertical-align: top; white-space: nowrap; font-size: 12px; }
    th { position: sticky; top: 0; background: #f8fafc; z-index: 1; }
    .empty { padding: 24px; color: var(--muted); }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: 280px 1fr; height: auto; min-height: 100vh; }
      .list { height: 220px; }
      .panel { min-height: 0; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <section class="panel">
      <div class="head">
        <div class="title">Tables</div>
        <div class="small" id="tableCount">0</div>
      </div>
      <div class="tools"><input id="search" placeholder="테이블 검색" /></div>
      <div class="list" id="tableList"></div>
    </section>

    <section class="panel content">
      <div class="head">
        <div class="title">Oracle Query Runner</div>
        <div class="small">READ ONLY</div>
      </div>

      <div class="query-wrap">
        <textarea id="sql" rows="5" spellcheck="false">SELECT table_name FROM user_tables ORDER BY table_name</textarea>
        <div class="query-actions">
          <button id="runSql">쿼리 실행</button>
          <button id="reload" style="background:#fff;color:var(--text);border-color:var(--line);">테이블 새로고침</button>
        </div>
      </div>

      <div class="status" id="status">준비됨</div>
      <div class="grid-wrap" id="result"></div>
    </section>
  </div>

  <script>
    const tableListEl = document.getElementById("tableList");
    const tableCountEl = document.getElementById("tableCount");
    const searchEl = document.getElementById("search");
    const sqlEl = document.getElementById("sql");
    const runSqlEl = document.getElementById("runSql");
    const reloadEl = document.getElementById("reload");
    const resultEl = document.getElementById("result");
    const statusEl = document.getElementById("status");

    let tables = [];
    let activeTable = "";

    const setStatus = (message, isError = false) => {
      statusEl.textContent = message;
      statusEl.className = isError ? "status err" : "status";
    };

    const renderGrid = (rows) => {
      if (!rows || rows.length === 0) {
        resultEl.innerHTML = '<div class="empty">결과가 없습니다.</div>';
        return;
      }
      const cols = Object.keys(rows[0]);
      const head = `<tr>${cols.map((c) => `<th>${c}</th>`).join("")}</tr>`;
      const body = rows.map((row) => `<tr>${cols.map((c) => `<td>${String(row[c] ?? "")}</td>`).join("")}</tr>`).join("");
      resultEl.innerHTML = `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
    };

    const fetchTables = async () => {
      const q = encodeURIComponent(searchEl.value.trim());
      const res = await fetch(`/api/tables?search=${q}`);
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      tables = data.tables;
      tableCountEl.textContent = String(tables.length);
      tableListEl.innerHTML = tables.map((name) => {
        const active = name === activeTable ? "active" : "";
        return `<button class="table-item ${active}" data-name="${name}">${name}</button>`;
      }).join("");
    };

    const previewTable = async (tableName) => {
      activeTable = tableName;
      await fetchTables();
      setStatus(`${tableName} 미리보기 로딩중...`);
      const res = await fetch(`/api/table/${encodeURIComponent(tableName)}?limit=100`);
      if (!res.ok) {
        setStatus(await res.text(), true);
        return;
      }
      const data = await res.json();
      sqlEl.value = `SELECT * FROM ${tableName} FETCH FIRST 100 ROWS ONLY`;
      renderGrid(data.rows);
      setStatus(`${tableName}: ${data.rows.length} rows`);
    };

    const runQuery = async () => {
      const sql = sqlEl.value.trim();
      if (!sql) return;
      setStatus("쿼리 실행중...");
      const res = await fetch("/api/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sql, limit: 300 })
      });
      if (!res.ok) {
        setStatus(await res.text(), true);
        return;
      }
      const data = await res.json();
      renderGrid(data.rows);
      setStatus(`성공: ${data.rows.length} rows`);
    };

    tableListEl.addEventListener("click", (e) => {
      const el = e.target.closest(".table-item");
      if (!el) return;
      previewTable(el.dataset.name).catch((err) => setStatus(err.message, true));
    });

    searchEl.addEventListener("input", () => {
      fetchTables().catch((err) => setStatus(err.message, true));
    });

    runSqlEl.addEventListener("click", () => {
      runQuery().catch((err) => setStatus(err.message, true));
    });

    reloadEl.addEventListener("click", () => {
      fetchTables().catch((err) => setStatus(err.message, true));
    });

    fetchTables().then(() => setStatus("준비됨")).catch((err) => setStatus(err.message, true));
  </script>
</body>
</html>
