<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>위치 정보</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    body {
      font-family: ui-sans-serif, system-ui, sans-serif;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    #root {
      width: 100%;
      height: 100vh;
      border-radius: 12px;
      overflow: hidden;
      background: #f8fafc;
      position: relative;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      color: #64748b;
    }

    .spinner {
      margin-bottom: 12px;
      width: 24px;
      height: 24px;
      border: 3px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <div class="loading-container">
      <div class="spinner"></div>
      <div style="font-size: 14px; font-weight: 500;">위치 정보를 불러오는 중...</div>
    </div>
  </div>
  <script>
    const root = document.getElementById('root');

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderLocation(address, title, domain) {
      if (!address || !domain) return;

      const iframeUrl = `${domain}/embed/map?address=${encodeURIComponent(address)}&title=${encodeURIComponent(title || address)}`;
      root.innerHTML = '<iframe src="' + iframeUrl + '" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;overflow:hidden;"></iframe>';
    }

    function renderFromPayload(toolOutput) {
      if (!toolOutput) return;
      // Depending on the SDK version, toolOutput might BE the structuredContent
      // or it might WRAP the structuredContent.
      const data = toolOutput.structuredContent || toolOutput;

      if (data && data.address && data.domain) {
        renderLocation(data.address, data.title, data.domain);
      }
    }

    // 1) Legacy Sync Data
    try {
      if (window?.openai?.toolOutput) {
        renderFromPayload(window.openai.toolOutput);
      }
    } catch (e) { }

    // 2) Async Tool-Result Event Listener (Legacy)
    window.addEventListener('message', (event) => {
      if (event.source !== window.parent) return;
      const message = event.data;
      if (!message || message.jsonrpc !== '2.0') return;
      if (message.method === 'ui/notifications/tool-result') {
        renderFromPayload(message.params);
      }
    });

    // 3) New Apps SDK Globals Listener
    window.addEventListener("openai:set_globals", (event) => {
      renderFromPayload(event.detail?.globals?.toolOutput);
    });
  </script>
</body>

</html>
