<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' *; frame-src 'self' *; connect-src 'self' *; img-src 'self' data: *;">
  <title>위치 정보</title>
  <style>
    /* ===== global-ui (인라인) ===== */
    :root {
      --radius-main: 18px;
      --card-shadow: 0 10px 30px rgba(15, 23, 42, 0.16);
      --card-border: 1px solid rgba(203, 213, 225, 0.8);
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      background: transparent !important;
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    }

    body {
      padding: 0 !important;
    }

    .widget-root {
      margin: 0;
      width: 100%;
      border-radius: var(--radius-main);
      border: var(--card-border);
      box-shadow: var(--card-shadow);
      background: #ffffff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      box-sizing: border-box;
    }

    #dev-test-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .05);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      pointer-events: none;
    }

    #dev-test-panel {
      pointer-events: auto;
      background: #1e293b;
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      font-size: 11px;
      box-shadow: 0 20px 25px -5px rgb(0 0 0/.1);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #dev-test-panel button {
      background: #384455;
      color: #fff;
      border: none;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    #dev-test-panel button:hover {
      background: #475569;
    }

    /* ===== 위젯 고유 스타일 ===== */

    .shell {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .title-group {
      display: flex;
      flex-direction: column;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted);
    }

    .full-screen-btn {
      background: #ffffff;
      color: #333;
      border: 1px solid var(--line);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      padding: 0;
    }

    .full-screen-btn:hover {
      background: #f8fafc;
      border-color: #0ea5e9;
      color: #0ea5e9;
    }

    .full-screen-btn svg {
      width: 18px;
      height: 18px;
    }

    #content {
      height: 260px;
      display: flex;
      flex-direction: column;
      background: #f1f5f9;
      position: relative;
      overflow: hidden;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: #f8fafc;
      z-index: 5;
      transition: opacity 0.5s ease-out;
    }

    /* 로딩 스피너 애니메이션 */
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #0ea5e9;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      opacity: 0;
      transition: opacity 0.4s ease-in;
    }

    iframe.loaded {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="widget-root">
    <div class="shell">
      <div class="header">
        <div class="title-group">
          <div class="title" id="title">위치 정보</div>
          <div class="subtitle" id="subtitle">주소를 확인 중입니다...</div>
        </div>
        <button id="full-screen-btn" class="full-screen-btn" style="display: none;" title="카카오맵에서 크게보기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
            <polyline points="15 3 21 3 21 9"></polyline>
            <line x1="10" y1="14" x2="21" y2="3"></line>
          </svg>
        </button>
      </div>
      <div id="content">
        <div id="loading" class="loading-overlay">
          <div class="spinner"></div>
        </div>
        <div id="map-container" style="height: 100%; width: 100%;"></div>
      </div>
    </div>
  </div>

  <script>
    const titleEl = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');
    const contentEl = document.getElementById('content');
    const loadingEl = document.getElementById('loading');
    const fullScreenBtn = document.getElementById('full-screen-btn');

    let currentAddresses = [];

    function renderLocation(addresses = [], title, domain, searchPattern = {}, stats = []) {
      if (addresses.length === 0 || !domain) return;
      currentAddresses = addresses;

      titleEl.textContent = title || '위치 정보';
      subtitleEl.textContent = addresses.length === 1 
        ? addresses[0] 
        : `${addresses[0]} 외 ${addresses.length - 1}곳`;

      // 1) Show loading
      loadingEl.style.opacity = '1';
      loadingEl.style.display = 'grid';

      // 2) Create Iframe
      let iframeUrl = `${domain}/embed/map?title=${encodeURIComponent(title || addresses[0])}`;
      iframeUrl += `&addresses=${encodeURIComponent(JSON.stringify(addresses))}`;
      
      if (searchPattern && Object.keys(searchPattern).length > 0) {
        iframeUrl += `&searchPattern=${encodeURIComponent(JSON.stringify(searchPattern))}`;
      }

      if (stats && stats.length > 0) {
        iframeUrl += `&stats=${encodeURIComponent(JSON.stringify(stats))}`;
      }

      fullScreenBtn.style.display = 'flex';

      const iframe = document.createElement('iframe');
      iframe.src = iframeUrl;
      iframe.title = '지도';

      iframe.onload = () => {
        // 3) Hide loading with transition
        iframe.className = 'loaded';
        loadingEl.style.opacity = '0';
        setTimeout(() => loadingEl.style.display = 'none', 500);
      };

      const container = document.getElementById('map-container');
      container.innerHTML = '';
      container.appendChild(iframe);
    }

    fullScreenBtn.addEventListener('click', () => {
      if (currentAddresses && currentAddresses.length > 0) {
        // Link to Kakao Map Search
        const searchAddr = currentAddresses[0];
        const kakaoUrl = `https://map.kakao.com/link/search/${encodeURIComponent(searchAddr)}`;
        window.open(kakaoUrl, '_blank');
      }
    });

    // --- Message Listeners ---
    window.addEventListener('message', (event) => {
      if (event.source !== window.parent) return;
      const message = event.data;
      if (message?.method === 'ui/notifications/tool-result') {
        const data = message.params?.structuredContent || message.params;
        if (data?.addresses) {
          renderLocation(data.addresses, data.title, data.domain, data.searchPattern, data.stats);
        }
      }
    });

    window.addEventListener('openai:set_globals', (event) => {
      const data = event.detail?.globals?.toolOutput?.structuredContent || event.detail?.globals?.toolOutput;
      if (data?.addresses) {
        renderLocation(data.addresses, data.title, data.domain, data.searchPattern, data.stats);
      }
    }, { passive: true });

    try {
      const data = window?.openai?.toolOutput?.structuredContent || window?.openai?.toolOutput;
      if (data?.addresses) {
        renderLocation(data.addresses, data.title, data.domain, data.searchPattern, data.stats);
      }
    } catch (e) { }

    // --- Local Dev Flow Simulator ---
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
      const devPanel = document.createElement('div');
      devPanel.id = 'dev-test-overlay';
      devPanel.innerHTML = `
        <div id="dev-test-panel">
          <b>🛠️ Local Map Test</b>
          <button onclick="mockMap()">단일 주소 테스트</button>
          <button onclick="mockMultiMap()">다중 주소 테스트</button>
        </div>
      `;
      document.body.appendChild(devPanel);

      window.mockMap = () => {
        renderLocation('경기도 성남시 분당구 정자동 화인아파트', '화인아파트 위치', location.origin);
      };

      window.mockMultiMap = () => {
        renderLocation('', '주요 아파트 비교', location.origin, [
          '서울 강남구 대치동 은마아파트',
          '서울 서초구 반포동 아크로리버파크',
          '서울 송파구 잠실동 잠실엘스'
        ]);
      };
    }
  </script>
</body>

</html>
