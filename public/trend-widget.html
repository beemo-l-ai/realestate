<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' *; frame-src 'self' *; connect-src 'self' *; img-src 'self' data: *;">
  <title>수도권 실거래가 위젯</title>
  <style>
    /* ===== global-ui (인라인) ===== */
    :root {
      --radius-main: 18px;
      --card-shadow: 0 10px 30px rgba(15, 23, 42, 0.16);
      --card-border: 1px solid rgba(203, 213, 225, 0.8);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #0b0b0f;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      background: transparent !important;
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
    }

    body {
      padding: 0 !important;
    }

    .widget-root {
      margin: 0;
      width: 100%;
      border-radius: var(--radius-main);
      border: var(--card-border);
      box-shadow: var(--card-shadow);
      background: #ffffff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      box-sizing: border-box;
    }

    .fixed-status {
      flex-shrink: 0;
      padding: 10px 14px;
      background: #f8fbff;
      border-top: 1px solid rgba(212, 222, 234, .8);
      font-size: 12px;
      text-align: center;
      color: #4b5563;
      z-index: 10;
    }

    #dev-test-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .05);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      pointer-events: none;
    }

    #dev-test-panel {
      pointer-events: auto;
      background: #1e293b;
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      font-size: 11px;
      box-shadow: 0 20px 25px -5px rgb(0 0 0/.1);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #dev-test-panel button {
      background: #384455;
      color: #fff;
      border: none;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    #dev-test-panel button:hover {
      background: #475569;
    }

    /* ===== 위젯 고유 스타일 ===== */
    main {
      padding: 16px;
      flex: 1;
      overflow-y: auto;
      background: #ffffff;
    }

    h3 {
      margin: 0 0 16px;
      font-size: 16px;
      font-weight: 700;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th,
    td {
      border: 1px solid #e5e7eb;
      padding: 10px;
      font-size: 13px;
    }

    th {
      background: #f8fafc;
      text-align: left;
      font-weight: 600;
      color: #475569;
    }

    .empty {
      color: #64748b;
      padding: 20px 0;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="widget-root">
    <main>
      <h3>📊 수도권 실거래가 추이</h3>
      <div id="app" class="empty">데이터를 불러오는 중...</div>
    </main>
    <div class="fixed-status">실거래 집계 데이터를 표로 제공합니다.</div>
  </div>

  <script type="module">
    const root = document.getElementById('app');

    const renderRows = (rows) => {
      if (!Array.isArray(rows) || rows.length === 0) {
        root.className = 'empty';
        root.textContent = '표시할 데이터가 없습니다.';
        return;
      }

      const table = document.createElement('table');
      const bodyRows = rows
        .map((r) => `\n<tr>` +
          `<td>${escapeHtml(r.yearMonth ?? '')}</td>` +
          `<td>${escapeHtml(r.region ?? '')}</td>` +
          `<td>${escapeHtml(r.apartmentName ?? '')}</td>` +
          `<td>${formatNumber(r.avgPriceKrw)}</td>` +
          `<td>${formatNumber(r.txCount)}</td>` +
          `</tr>`)
        .join('');

      table.innerHTML = `\n<thead><tr><th>년월</th><th>지역</th><th>아파트</th><th>평균가(원)</th><th>거래건수</th></tr></thead>` +
        `\n<tbody>${bodyRows}</tbody>`;

      root.className = '';
      root.innerHTML = '';
      root.appendChild(table);
    };

    const escapeHtml = (value) => String(value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const formatNumber = (value) => {
      const n = Number(value);
      if (!Number.isFinite(n)) return '';
      return n.toLocaleString('ko-KR');
    };

    // --- Message Listeners ---
    window.addEventListener('message', (event) => {
      if (event.source !== window.parent) return;
      const message = event.data;
      if (message?.method === 'ui/notifications/tool-result') {
        const rows = message.params?.structuredContent?.rows || message.params?.rows;
        if (rows) renderRows(rows);
      }
    });

    try { if (window?.openai?.toolOutput?.structuredContent?.rows) renderRows(window.openai.toolOutput.structuredContent.rows); } catch { }

    // --- Local Dev Flow Simulator ---
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
      const devPanel = document.createElement('div');
      devPanel.id = 'dev-test-overlay';
      devPanel.innerHTML = `
          <div id="dev-test-panel">
            <b>🛠️ Local Trend Test</b>
            <button onclick="mockTrends()">샘플 데이터 주입</button>
          </div>
        `;
      document.body.appendChild(devPanel);

      window.mockTrends = () => {
        renderRows([
          { yearMonth: "202401", region: "분당구", apartmentName: "화인아파트", avgPriceKrw: 1250000000, txCount: 5 },
          { yearMonth: "202402", region: "분당구", apartmentName: "화인아파트", avgPriceKrw: 1280000000, txCount: 3 }
        ]);
      };
    }
  </script>
</body>

</html>
