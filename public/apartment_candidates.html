<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>아파트 후보 선택</title>
  <style>
    /* ===== global-ui (인라인) ===== */
    :root {
      --radius-main: 18px;
      --card-shadow: 0 10px 30px rgba(15, 23, 42, 0.16);
      --card-border: 1px solid rgba(203, 213, 225, 0.8);
      --line: rgba(212, 222, 234, 0.7);
      --text: #0f172a;
      --muted: #4b5563;
      --accent: #0ea5e9;
      --accent-soft: rgba(224, 242, 254, 0.8);
      --radius-md: 12px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      background: transparent !important;
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    }

    body {
      padding: 0 !important;
    }

    .widget-root {
      margin: 0;
      width: 100%;
      border-radius: var(--radius-main);
      border: var(--card-border);
      box-shadow: var(--card-shadow);
      background: #ffffff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      box-sizing: border-box;
    }

    /* 로컬 테스트 오버레이 */
    #dev-test-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .05);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      pointer-events: none;
    }

    #dev-test-panel {
      pointer-events: auto;
      background: #1e293b;
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      font-size: 11px;
      box-shadow: 0 20px 25px -5px rgb(0 0 0/.1);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #dev-test-panel button {
      background: #384455;
      color: #fff;
      border: none;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    #dev-test-panel button:hover {
      background: #475569;
    }

    /* ===== 위젯 고유 스타일 ===== */
    #root {
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: #f8fbff;
      flex-shrink: 0;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .count {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 2px 6px;
    }

    .hint {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .body {
      padding: 12px;
      max-height: 340px;
      overflow-y: auto;
      display: grid;
      gap: 8px;
      background: #f8fafc;
    }

    .skeleton {
      display: grid;
      gap: 8px;
    }

    .sk-item {
      height: 68px;
      border-radius: var(--radius-md);
      background: linear-gradient(100deg, rgba(237, 242, 249, .6) 20%, rgba(248, 251, 255, .8) 50%, rgba(237, 242, 249, .6) 80%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0
      }

      100% {
        background-position: -200% 0
      }
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .item {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      background: #ffffff;
      cursor: pointer;
      transition: all .2s ease;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .item:hover:not(:disabled) {
      border-color: var(--accent);
      background: #f0f9ff;
      transform: translateY(-1px);
    }

    .item:disabled {
      cursor: default;
      opacity: 0.45;
      pointer-events: none;
    }

    .item.selected {
      border-color: var(--accent);
      background: #e0f2fe;
      opacity: 1;
      pointer-events: none;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }

    .name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .sub {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .chip {
      font-size: 11px;
      color: var(--muted);
      background: #f1f5f9;
      border-radius: 4px;
      padding: 1px 5px;
    }

    .alias {
      font-size: 11px;
      color: #0284c7;
      background: #e0f2fe;
      border-radius: 4px;
      padding: 1px 5px;
    }

    .status {
      flex-shrink: 0;
      padding: 10px 14px;
      font-size: 12px;
      text-align: center;
      background: #f8fbff;
      border-top: 1px solid var(--line);
      color: #4b5563;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .status.empty {
      color: #ef4444;
      background: #fef2f2;
    }

    .status .mini-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid #cbd5e1;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .hidden {
      display: none !important;
    }

    .body::-webkit-scrollbar {
      width: 4px;
    }

    .body::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, .1);
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div class="widget-root">
    <div id="root">
      <div class="header">
        <div class="title-row">
          <h1>단지 선택</h1>
          <span id="count" class="count">찾는 중...</span>
        </div>
        <p class="hint">단지를 선택하면 해당 정보로 조회를 바로 재개합니다.</p>
      </div>

      <div class="body">
        <div id="loading" class="skeleton">
          <div class="sk-item"></div>
          <div class="sk-item"></div>
        </div>
        <div id="list" class="list hidden"></div>
      </div>

      <div id="status" class="status hidden"></div>
    </div>
  </div>

  <script>
    const loadingEl = document.getElementById('loading');
    const listEl = document.getElementById('list');
    const statusEl = document.getElementById('status');
    const countEl = document.getElementById('count');

    function escapeHtml(v) {
      return String(v || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;");
    }

    let isSelected = false;

    function setStatus(msg, type) {
      if (!msg) { statusEl.classList.add('hidden'); return; }
      statusEl.className = `status ${type === 'empty' ? 'empty' : ''}`;
      if (type === 'loading') {
        statusEl.innerHTML = `<span class="mini-spinner"></span><span>${msg}</span>`;
      } else {
        statusEl.textContent = msg;
      }
      statusEl.classList.remove('hidden');
    }

    async function selectCandidate(item, btnEl) {
      if (isSelected) return;
      isSelected = true;

      const selectedText = `${item.legalDong || ''} ${item.apartmentName || ''}`.trim();

      // Disable all buttons & highlight the selected one
      const buttons = listEl.querySelectorAll('button.item');
      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn === btnEl) btn.classList.add('selected');
      });

      setStatus(`${selectedText} 선택됨 · 조회를 재개하는 중...`, 'loading');

      try {
        const followupText = `${selectedText} 단지로 선택했어. 방금 전 요청을 이 단지 기준으로 바로 계속 진행해줘.`.trim();

        if (typeof window?.openai?.sendFollowUpMessage === 'function') {
          await window.openai.sendFollowUpMessage({ prompt: followupText });
        }

        setStatus(`${selectedText} 선택 완료 · 채팅에서 결과를 확인하세요.`);

        // --- Local Simulator logic ---
        if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
          alert(`[Simulator] ChatGPT에게 메시지 전달됨:\n"${followupText}"`);
        }
      } catch (err) {
        setStatus('전달 오류: ' + err.message, 'empty');
        // Don't re-enable — keep locked to prevent duplicate sends
      }
    }

    function renderCandidates(candidates, fallbackMode) {
      loadingEl.classList.add('hidden');
      listEl.classList.remove('hidden');

      if (!candidates?.length) {
        countEl.textContent = '0개';
        listEl.innerHTML = '';
        setStatus('일치하는 단지가 없습니다.', 'empty');
        return;
      }

      countEl.textContent = `${candidates.length}개 후보`;
      listEl.innerHTML = candidates.map((item, idx) => {
        const name = `${item.legalDong || ''} ${item.apartmentName || ''}`.trim();
        const trades = Number(item.totalTrades || 0).toLocaleString();
        const aliases = Array.isArray(item.aliases) ? item.aliases.slice(0, 2) : [];

        return `
          <button class="item" type="button" data-index="${idx}">
            <div class="name-row">
              <span class="dot"></span>
              <span class="name">${escapeHtml(name)}</span>
            </div>
            <div class="sub">
              <span class="chip">${escapeHtml(item.districtCode || '')}</span>
              <span class="chip">실거래 ${escapeHtml(trades)}건</span>
              ${aliases.map(a => `<span class="alias">#${escapeHtml(a)}</span>`).join('')}
            </div>
          </button>
        `;
      }).join('');

      setStatus('목록에서 단지를 선택하세요.');

      listEl.querySelectorAll('button.item').forEach((button) => {
        button.addEventListener('click', () => {
          if (isSelected) return;
          const item = candidates[Number(button.getAttribute('data-index'))];
          if (item) selectCandidate(item, button);
        });
      });
    }

    function renderFromPayload(payload) {
      const data = payload?.structuredContent || payload;
      if (data?.candidates) renderCandidates(data.candidates, data.fallbackMode);
    }

    // --- Message Listeners ---
    window.addEventListener('message', (event) => {
      if (event.source !== window.parent) return;
      const message = event.data;
      if (message?.method === 'ui/notifications/tool-result') {
        renderFromPayload(message.params);
      }
    });

    // ChatGPT SDK: toolOutput가 스크립트 실행 후 설정될 수 있으므로 set_globals 이벤트도 수신
    window.addEventListener('openai:set_globals', (event) => {
      renderFromPayload(event.detail?.globals?.toolOutput);
    }, { passive: true });

    try { if (window?.openai?.toolOutput) renderFromPayload(window.openai.toolOutput); } catch (e) { }

    // --- Local Dev Flow Simulator ---
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
      const devPanel = document.createElement('div');
      devPanel.id = 'dev-test-overlay';
      devPanel.innerHTML = `
        <div id="dev-test-panel">
          <b>🛠️ Local Candidate Test</b>
          <button onclick="mockCandidates()">샘플 데이터 주입</button>
        </div>
      `;
      document.body.appendChild(devPanel);

      window.mockCandidates = () => {
        renderFromPayload({
          candidates: [
            { apartmentName: "화인아파트", legalDong: "정자동", totalTrades: 150, districtCode: "41135" },
            { apartmentName: "유천화인", legalDong: "금곡동", totalTrades: 80, districtCode: "41135" }
          ],
          fallbackMode: "none"
        });
      };
    }
  </script>
</body>

</html>
