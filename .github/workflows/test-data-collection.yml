name: Test Data Collection

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "collectByDate mode"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - bootstrap
      from:
        description: "Start date (YYYY-MM-DD)"
        required: true
        default: "2025-01-01"
      to:
        description: "End date (YYYY-MM-DD, required for bootstrap)"
        required: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PROD_SECRET: ${{ secrets.PROD_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load and validate secrets
        run: |
          set -euo pipefail

          if [ -z "${PROD_SECRET:-}" ]; then
            echo "::error::Missing secret: PROD_SECRET"
            echo "::error::Set this under Settings > Secrets and variables > Actions."
            exit 1
          fi

          declare -A parsed
          while IFS= read -r line || [ -n "$line" ]; do
            line="${line%$'\r'}"
            [ -z "$line" ] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue

            if [[ "$line" != *=* ]]; then
              echo "::warning::Skipping invalid PROD_SECRET line (expected key=value)."
              continue
            fi

            key="${line%%=*}"
            value="${line#*=}"
            key="${key#"${key%%[![:space:]]*}"}"
            key="${key%"${key##*[![:space:]]}"}"
            parsed["$key"]="$value"
          done <<< "$PROD_SECRET"

          required=(FIREBASE_PROJECT_ID FIREBASE_CLIENT_EMAIL FIREBASE_PRIVATE_KEY MOLIT_SERVICE_KEY)
          for key in "${required[@]}"; do
            value="${parsed[$key]:-}"
            if [ -z "$value" ]; then
              echo "::error::Missing secret: $key"
              echo "::error::Set this in PROD_SECRET as '$key=...'."
              exit 1
            fi

            if [ "$key" = "FIREBASE_PRIVATE_KEY" ]; then
              value="${value//\\n/$'\n'}"
            fi

            echo "::add-mask::$value"
            {
              echo "$key<<EOF"
              echo "$value"
              echo "EOF"
            } >> "$GITHUB_ENV"
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run check

      - name: Run collectByDate
        run: |
          set -euo pipefail
          ARGS=(--mode "${{ github.event.inputs.mode }}" --from "${{ github.event.inputs.from }}")
          if [ -n "${{ github.event.inputs.to }}" ]; then
            ARGS+=(--to "${{ github.event.inputs.to }}")
          fi
          npm run collect:date -- "${ARGS[@]}"
