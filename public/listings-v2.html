<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' *; frame-src 'self' *; connect-src 'self' *; img-src 'self' data: *;">
  <title>최근 실거래 사례</title>
  <style>
    /* ===== global-ui (인라인) ===== */
    :root {
      --radius-main: 18px;
      --card-shadow: 0 10px 30px rgba(15, 23, 42, 0.16);
      --card-border: 1px solid rgba(203, 213, 225, 0.8);
      --line: rgba(212, 222, 234, 0.7);
      --text: #0f172a;
      --muted: #4b5563;
      --accent: #0ea5e9;
      --accent-soft: rgba(224, 242, 254, 0.8);
      --radius-md: 12px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      background: transparent !important;
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    }

    body {
      padding: 0 !important;
    }

    .widget-root {
      margin: 0;
      width: 100%;
      border-radius: var(--radius-main);
      border: var(--card-border);
      box-shadow: var(--card-shadow);
      background: #ffffff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      box-sizing: border-box;
    }

    /* 로컬 테스트 오버레이 */
    #dev-test-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .05);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      pointer-events: none;
    }

    #dev-test-panel {
      pointer-events: auto;
      background: #1e293b;
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      font-size: 11px;
      box-shadow: 0 20px 25px -5px rgb(0 0 0/.1);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #dev-test-panel button {
      background: #384455;
      color: #fff;
      border: none;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    #dev-test-panel button:hover {
      background: #475569;
    }

    /* ===== 위젯 고유 스타일 ===== */
    #root {
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: #f8fbff;
      flex-shrink: 0;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .count {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 2px 6px;
    }

    .hint {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .body {
      padding: 12px;
      max-height: 400px;
      overflow-y: auto;
      display: grid;
      gap: 8px;
      background: #f8fafc;
    }

    .skeleton {
      display: grid;
      gap: 8px;
    }

    .sk-item {
      height: 72px;
      border-radius: var(--radius-md);
      background: linear-gradient(100deg, rgba(237, 242, 249, .6) 20%, rgba(248, 251, 255, .8) 50%, rgba(237, 242, 249, .6) 80%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0
      }

      100% {
        background-position: -200% 0
      }
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .card {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 14px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border-color .2s ease;
    }

    .card:hover {
      border-color: var(--accent);
    }

    .price {
      font-size: 16px;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.02em;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      font-size: 11px;
      color: var(--muted);
      background: #f1f5f9;
      border-radius: 4px;
      padding: 1px 6px;
    }

    .type-tag {
      font-size: 11px;
      font-weight: 700;
      color: #ffffff;
      background: var(--accent);
      border-radius: 4px;
      padding: 1px 6px;
    }

    .status {
      flex-shrink: 0;
      padding: 10px 14px;
      font-size: 12px;
      text-align: center;
      background: #f8fbff;
      border-top: 1px solid var(--line);
      color: #4b5563;
    }

    .hidden {
      display: none !important;
    }

    .body::-webkit-scrollbar {
      width: 4px;
    }

    .body::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, .1);
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div class="widget-root">
    <div id="root">
      <div class="header">
        <div class="title-row">
          <h1 id="header-title">실거래 사례</h1>
          <span id="count" class="count">불러오는 중...</span>
        </div>
        <p class="hint">최근 국토교통부에 신고된 실거래 사례 샘플입니다.</p>
      </div>

      <div class="body">
        <div id="loading" class="skeleton">
          <div class="sk-item"></div>
          <div class="sk-item"></div>
          <div class="sk-item"></div>
        </div>
        <div id="list" class="list hidden"></div>
      </div>

      <div id="status" class="status">실거래 상세 내역을 표시합니다.</div>
    </div>
  </div>

  <script>
    const loadingEl = document.getElementById('loading');
    const listEl = document.getElementById('list');
    const countEl = document.getElementById('count');
    const statusEl = document.getElementById('status');

    function escapeHtml(v) {
      return String(v || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function renderListings(listings) {
      loadingEl.classList.add('hidden');
      listEl.classList.remove('hidden');

      if (!Array.isArray(listings) || listings.length === 0) {
        countEl.textContent = '0건';
        listEl.innerHTML = '<div style="padding: 20px; text-align: center; color: #6b7280; font-size: 14px;">표시할 매물이 없습니다.</div>';
        return;
      }

      countEl.textContent = `${listings.length}건`;
      listEl.innerHTML = listings.map(function (item) {
        return `
          <div class="card">
            <div class="price">${escapeHtml(item.price)}</div>
            <div class="title">${escapeHtml(item.title)}</div>
            <div class="meta">
              <span class="type-tag">${escapeHtml(item.type)}</span>
              <span class="chip">${escapeHtml(item.city)}</span>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderFromPayload(toolOutput) {
      if (!toolOutput) return;
      const data = toolOutput.structuredContent || toolOutput;
      if (data && data.listings) {
        renderListings(data.listings);
      }
    }

    // --- Message Listeners ---
    window.addEventListener('message', (event) => {
      if (event.source !== window.parent) return;
      const message = event.data;
      if (!message || message.jsonrpc !== '2.0') return;
      if (message.method === 'ui/notifications/tool-result') {
        renderFromPayload(message.params);
      }
    }, { passive: true });

    window.addEventListener("openai:set_globals", (event) => {
      renderFromPayload(event.detail?.globals?.toolOutput);
    }, { passive: true });

    try {
      if (window?.openai?.toolOutput) {
        renderFromPayload(window.openai.toolOutput);
      }
    } catch (e) { }

    // --- Local Dev Flow Simulator ---
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
      const devPanel = document.createElement('div');
      devPanel.id = 'dev-test-overlay';
      devPanel.innerHTML = `
        <div id="dev-test-panel">
          <b>🛠️ Local Listings Test</b>
          <button onclick="mockListings()">샘플 데이터 주입</button>
        </div>
      `;
      document.body.appendChild(devPanel);

      window.mockListings = () => {
        renderFromPayload({
          listings: [
            { title: "정자동 화인아파트 84㎡", city: "경기 성남시분당구", type: "매매", price: "매매 12.5억" },
            { title: "정자동 화인아파트 84㎡", city: "경기 성남시분당구", type: "전세", price: "전세 7.2억" },
            { title: "금곡동 유천화인 59㎡", city: "경기 성남시분당구", type: "매매", price: "매매 9.8억" }
          ]
        });
      };
    }
  </script>
</body>

</html>
