<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>위치 정보</title>
  <link rel="stylesheet" href="global-ui.css">
  <style>
    :root {
      --card: #ffffff;
      --line: #d4deea;
      --text: #0f172a;
      --muted: #48607a;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.16);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: transparent;
      color: var(--text);
      overflow: hidden;
      padding: 0;
    }

    #root {
      background: rgba(255, 255, 255, 0.74);
      position: relative;
      height: calc(100% - 24px) !important;
    }

    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100%;
    }

    #content {
      min-height: 0;
      height: 100%;
      width: 100%;
    }

    #content:not(.loading) {
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 10px 14px 9px;
      border-bottom: 1px solid rgba(212, 222, 234, 0.8);
      background: rgba(248, 251, 255, 0.65);
    }

    .title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .subtitle {
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .loading {
      display: grid;
      place-items: center;
      padding: 16px;
      color: #334155;
      font-size: 13px;
      text-align: center;
      gap: 12px;
    }

    .pulse {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 2px solid #bfdbfe;
      position: relative;
    }

    .pulse::before,
    .pulse::after {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      border: 2px solid #bfdbfe;
      animation: pulse 1.6s ease-out infinite;
    }

    .pulse::after { animation-delay: 0.8s; }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.9); opacity: 0; }
    }

    .map-frame {
      flex: 1;
      margin: 0;
      border-radius: 0;
      overflow: hidden;
      border: none;
      background: #f7fbff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #f7fbff;
      display: block;
    }

    @media (max-width: 720px) {
      #root {
        height: 320px;
        max-height: 320px;
        min-height: 320px;
      }
    }
  </style>
</head>

<body>
  <div id="root" class="widget-root">
    <div class="shell">
      <div class="header">
        <div class="title" id="title">위치 정보</div>
        <div class="subtitle" id="subtitle">주소를 확인하는 중입니다...</div>
      </div>
      <div id="content" class="loading">
        <div class="pulse" aria-hidden="true"></div>
        <div>지도를 준비하고 있습니다</div>
      </div>
    </div>
  </div>

  <script>
    const titleEl = document.getElementById('title');
    const subtitleEl = document.getElementById('subtitle');
    const contentEl = document.getElementById('content');
    let lastRenderKey = "";

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderLocation(address, title, domain) {
      if (!address || !domain) return;
      const renderKey = `${domain}|${address}|${title || ""}`;
      if (renderKey === lastRenderKey) return;
      lastRenderKey = renderKey;

      titleEl.textContent = title || '위치 정보';
      subtitleEl.textContent = address;

      const iframeUrl = `${domain}/embed/map?address=${encodeURIComponent(address)}&title=${encodeURIComponent(title || address)}`;
      contentEl.className = '';
      contentEl.innerHTML = `<div class="map-frame"><iframe title="지도" src="${escapeHtml(iframeUrl)}"></iframe></div>`;
    }

    function renderFromPayload(toolOutput) {
      if (!toolOutput) return;
      const data = toolOutput.structuredContent || toolOutput;
      if (data && data.address && data.domain) {
        renderLocation(data.address, data.title, data.domain);
      }
    }

    try {
      if (window?.openai?.toolOutput) {
        renderFromPayload(window.openai.toolOutput);
      }
    } catch (e) { }

    window.addEventListener('message', (event) => {
      if (event.source !== window.parent) return;
      const message = event.data;
      if (!message || message.jsonrpc !== '2.0') return;
      if (message.method === 'ui/notifications/tool-result') {
        renderFromPayload(message.params);
      }
    });

    window.addEventListener('openai:set_globals', (event) => {
      renderFromPayload(event.detail?.globals?.toolOutput);
    });
  </script>
</body>

</html>
